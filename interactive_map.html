    <!-- CSS de Leaflet MarkerCluster -->

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map-container { position: relative; width: 100%; height: 100vh; }
        #map { width: 100%; height: 100%; }
        /* Style amélioré pour la légende avec les filtres */
        .info.legend { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.2); line-height: 24px; color: #333; max-height: 80vh; overflow-y: auto;}
        .info.legend h4 { margin: 0 0 10px 0; font-size: 16px; color: #000; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; cursor: pointer; transition: opacity 0.2s; }
        .legend-item:hover { opacity: 0.8; }
        .legend-item input[type="checkbox"] { margin-right: 8px; cursor: pointer; }
        .legend-color { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin-right: 8px; border: 1px solid rgba(0,0,0,0.2); }
        .custom-popup .leaflet-popup-content-wrapper { border-radius: 8px; }
        .custom-popup .leaflet-popup-content { margin: 15px; }
        .custom-popup h3 { margin: 0 0 5px 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .custom-popup p { margin: 5px 0; color: #555; font-size: 13px; }
        .type-badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; color: white; margin-bottom: 5px; }
        .commodity-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; background: #eee; color: #333; margin-right: 4px; border: 1px solid #ccc;}
        .company-list-container { margin-top: 15px; border-top: 2px solid #eee; padding-top: 10px; }
        .company-list-toggle { cursor: pointer; color: #3498db; font-weight: bold; font-size: 14px; user-select: none; }
        .company-list-toggle:hover { text-decoration: underline; }
        .company-list { display: none; margin-top: 10px; max-height: 250px; overflow-y: auto; font-size: 13px; }
        .company-list.active { display: block; }
        .company-item { padding: 4px 0; border-bottom: 1px solid #f5f5f5; cursor: pointer; display: flex; align-items: center;}
        .company-item:hover { background-color: #f9f9f9; }
        .company-item-color { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    </style>
</head>

    // Création d'un objet pour stocker un MarkerClusterGroup par type
    const layerGroups = {};
    for (const type in colors) {
        if(type !== 'Other') { /* On ignore 'Other' s'il n'est pas utilisé activement  */
           layerGroups[type] = L.markerClusterGroup({
                chunkedLoading: true,
                maxClusterRadius: 50,
                spiderfyOnMaxZoom: true,
                showCoverageOnHover: false,
                zoomToBoundsOnClick: true
            });
            // Ajouter tous les groupes à la carte par défaut
            map.addLayer(layerGroups[type]);
        }
    }

    // Répartition des marqueurs dans le bon groupe
    companiesData.forEach(function(company) {
        const type = company.type;
        const markerColor = colors[type] || colors['Other'];
        
        let commodityBadge = '';
        if (type.includes('Copper')) commodityBadge = '<span class="commodity-badge">Cuivre</span>';
        else if (type.includes('Gold')) commodityBadge = '<span class="commodity-badge">Or</span>';
        else if (type.includes('Iron')) commodityBadge = '<span class="commodity-badge">Fer</span>';
        else if (type.includes('Lithium')) commodityBadge = '<span class="commodity-badge">Lithium</span>';
        else if (type.includes('Diamond')) commodityBadge = '<span class="commodity-badge">Diamant</span>';
        else if (type.includes('Coal/Uranium/Other')) commodityBadge = '<span class="commodity-badge">Nickel/Uranium/Charbon</span>';

        const popupContent = `
            <div>
                <h3>${company.name}</h3>
                <span class="type-badge" style="background-color: ${markerColor};">${type.split(' (')[0]}</span>
                ${commodityBadge}
                <p><strong>Localisation / HQ :</strong> ${company.hq}</p>
                <p>${company.description}</p>
            </div>
        `;

        if(company.lat && company.lng) {
            let m = L.marker([company.lat, company.lng], {icon: getCustomIcon(type)})
             .bindPopup(popupContent, {className: 'custom-popup'});
            
            company.markerObj = m;
            if(layerGroups[type]) {
                layerGroups[type].addLayer(m);
            }
        }
    });

    // Création du contrôle customisé (Légende + Filtres à cocher)
    var customLegendFilter = L.control({position: 'bottomright'});

    customLegendFilter.onAdd = function (map) {
        var div = L.DomUtil.create('div', 'info legend');
        div.innerHTML = '<h4>Filtres (Types & Ressources)</h4>';
        
        for (let type in colors) {
            if (type === 'Other') continue;
            
            let displayName = type;
            if (type.startsWith('Mining Site')) {
                displayName = "Mine - " + type.split('(')[1].replace(')', '');
            }
            
            // Création de l'interface du filtre
            const label = document.createElement('label');
            label.className = 'legend-item';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = true; // Caché s'il est décoché
            checkbox.value = type;
            
            // Logique du filtre : ajouter ou retirer le ClusterGroup de la carte
            checkbox.addEventListener('change', function() {
                if (this.checked) {
                    map.addLayer(layerGroups[this.value]);
                } else {
                    map.removeLayer(layerGroups[this.value]);
                }
            });

            const colorSpan = document.createElement('span');
            colorSpan.className = 'legend-color';
            colorSpan.style.backgroundColor = colors[type];

            const textSpan = document.createElement('span');
            textSpan.textContent = displayName;

            label.appendChild(checkbox);
            label.appendChild(colorSpan);
            label.appendChild(textSpan);
            
            div.appendChild(label);
        }
        
        // Sous-menu contenant la liste de toutes les entreprises
        const companyListContainer = document.createElement('div');
        companyListContainer.className = 'company-list-container';
        
        const toggleBtn = document.createElement('div');
        toggleBtn.className = 'company-list-toggle';
        toggleBtn.innerHTML = '▶ Liste des sites & entreprises (' + companiesData.length + ')';
        
        const companyList = document.createElement('div');
        companyList.className = 'company-list';
        
        // Trier les entreprises par nom
        const sortedCompanies = [...companiesData].sort((a, b) => a.name.localeCompare(b.name));
        
        sortedCompanies.forEach(company => {
            const item = document.createElement('div');
            item.className = 'company-item';
            
            const colorDot = document.createElement('span');
            colorDot.className = 'company-item-color';
            colorDot.style.backgroundColor = colors[company.type] || colors['Other'];
            
            const textNode = document.createTextNode(company.name);
            
            item.appendChild(colorDot);
            item.appendChild(textNode);
            
            // Au clic, zoomer sur l'entreprise
            item.addEventListener('click', () => {
                if(company.lat && company.lng) {
                    map.flyTo([company.lat, company.lng], 10);
                    // On peut aussi ouvrir le popup correspondant, 
                    // mais cela demanderait de garder la référence au marker.
                    // FlyTo est déjà très bien !
                }
            });
            
            companyList.appendChild(item);
        });
        
        toggleBtn.addEventListener('click', () => {
            companyList.classList.toggle('active');
            if(companyList.classList.contains('active')) {
                toggleBtn.innerHTML = '▼ Liste des sites & entreprises (' + companiesData.length + ')';
            } else {
                toggleBtn.innerHTML = '▶ Liste des sites & entreprises (' + companiesData.length + ')';
            }
        });
        
        companyListContainer.appendChild(toggleBtn);
        companyListContainer.appendChild(companyList);
        
        div.appendChild(companyListContainer);
        
        // === BOUTON ET SELECTEUR POUR AFFICHER LIENS RESEAUX ===
        const networkToggleContainer = document.createElement('div');
        networkToggleContainer.style.marginTop = '15px';
        networkToggleContainer.style.borderTop = '2px solid #eee';
        networkToggleContainer.style.paddingTop = '10px';
        
        const networkTitle = document.createElement('div');
        networkTitle.textContent = 'Réseaux d\'entreprises (HQ-Filiales)';
        networkTitle.style.fontWeight = 'bold';
        networkTitle.style.fontSize = '14px';
        networkTitle.style.marginBottom = '5px';
        networkTitle.style.color = '#e44d26';
        
        // Trouver tous les groupes uniques disponibles
        const availableGroups = new Set();
        companiesData.forEach(c => {
            if (c.groupId) availableGroups.add(c.groupId);
        });

        const networkSelect = document.createElement('select');
        networkSelect.style.width = '100%';
        networkSelect.style.padding = '5px';
        networkSelect.style.borderRadius = '4px';
        networkSelect.style.border = '1px solid #ccc';
        
        // Option par défaut
        const defaultOption = document.createElement('option');
        defaultOption.value = "";
        defaultOption.textContent = "Masquer les réseaux";
        networkSelect.appendChild(defaultOption);

        // Ajouter une option pour chaque groupe détecté
        availableGroups.forEach(group => {
            const option = document.createElement('option');
            option.value = group;
            option.textContent = "Afficher le réseau : " + group;
            networkSelect.appendChild(option);
        });
        
        networkSelect.addEventListener('change', function() {
            selectedNetwork = this.value;
            drawNetworkLinks();
        });

        networkToggleContainer.appendChild(networkTitle);
        networkToggleContainer.appendChild(networkSelect);
        div.appendChild(networkToggleContainer);

        // Empêcher les clics dans la légende de créer un "click" sur la carte derrière
        L.DomEvent.disableClickPropagation(div);

        return div;
    };

    customLegendFilter.addTo(map);

    // === SYSTEME DE LIENS HQ <-> FILIALES ===
    var polylines = L.layerGroup().addTo(map);
    var selectedNetwork = "";

    function drawNetworkLinks() {
        polylines.clearLayers();
        if(selectedNetwork === "") return;

        const groups = {};
        companiesData.forEach(c => {
            if(c.groupId && c.markerObj && c.groupId === selectedNetwork) {
                if(!groups[c.groupId]) groups[c.groupId] = { hq: null, subsidiaries: [] };
                if(c.isHQ) groups[c.groupId].hq = c.markerObj;
                else groups[c.groupId].subsidiaries.push(c.markerObj);
            }
        });

        for(let g in groups) {
            let hq = groups[g].hq;
            if(!hq) continue;
            let hqLatlng = hq.getLatLng();
            groups[g].subsidiaries.forEach(sub => {
                let subLatlng = sub.getLatLng();
                L.polyline([hqLatlng, subLatlng], {color: '#3498db', weight: 2, opacity: 0.6, dashArray: '5, 5'}).addTo(polylines);
            });
        }
    }
